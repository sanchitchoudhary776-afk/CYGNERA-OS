<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="CYGNERA OS — The AI-powered study platform that adapts to you" />
    <meta name="theme-color" content="#09cd83" />
    <title>CYGNERA OS</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Plus+Jakarta+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet" />

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <style>
      /* Critical: prevent flash of unstyled content */
      html { background: #0e1510; }
      body { margin: 0; font-family: 'Plus Jakarta Sans', sans-serif; }
      #root { min-height: 100dvh; }
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 600, 'GRAD' 200, 'opsz' 24;
        user-select: none;
        -webkit-font-smoothing: subpixel-antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      /* Scrollbar */
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: #161d18; }
      ::-webkit-scrollbar-thumb { background: #3c4a40; border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: #09cd83; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
